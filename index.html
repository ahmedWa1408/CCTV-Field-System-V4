<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>الحركة الميدانية لقسم التشغيل CCTV</title>

<link rel="preconnect" href="https://fonts.googleapis.com">

<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800&display=swap" rel="stylesheet">

<link rel="stylesheet" href="css/style.css">

</head>

<body>

<div class="container">

<header class="headerCard">

<img src="assets/logo.png" class="logo" alt="تحكم">

<h1>إدارة أنظمة المراقبة الأمنية</h1>

<h2>قسم التشغيل CCTV</h2>

</header>

<section class="searchCard">

<label>رقم الخطة</label>

<input
type="number"
id="planNumber"
placeholder="أدخل رقم الخطة"
inputmode="numeric">

<button
id="searchBtn"
onclick="searchPlan()">

🔍 بحث عن الخطة

</button>

</section>

<section
id="planInfo"
class="planCard"
style="display:none;"><div class="routeHeader">

<h3 id="routeNumber">

الخطة رقم 1

</h3>

<h4 id="routeName">

عنيزة والمذنب

</h4>

</div>

<div class="routeStats">

<div class="miniCard">

<span>📍</span>

<h5>عدد المواقع</h5>

<b id="sitesCount">31</b>

</div>

<div class="miniCard">

<span>💾</span>

<h5>وحدات التخزين</h5>

<b id="storageCount">24</b>

</div>

<div class="miniCard">

<span>📅</span>

<h5>آخر تنفيذ</h5>

<b id="lastMission">--</b>

</div>

</div>

<div class="buttons">

<button
class="startBtn"
onclick="startMission()">

🚗 بدء المهمة

</button>

<button
class="historyBtn"
onclick="openHistory()">

📚 السجلات السابقة للمسار

</button>

<button
class="backBtn"
onclick="resetSearch()">

↩ الرجوع لرقم الخطة

</button>

</div>

</section>

<script src="data/plans.js"></script>

<script src="js/app.js"></script>

</body>

</html>
