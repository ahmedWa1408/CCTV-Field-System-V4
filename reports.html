<!DOCTYPE html>

<html lang="ar" dir="rtl">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>التقارير والإحصائيات</title>

<link rel="preconnect" href="https://fonts.googleapis.com">

<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800;900&display=swap" rel="stylesheet">

<link rel="stylesheet" href="css/reports.css">

</head>

<body>

<div class="container">

<header class="headerCard">

<div class="logoArea">

<img src="assets/logo.png" class="logo" alt="تحكم">

<div class="titleArea">

<h1>التقارير والإحصائيات</h1>

<h2>إدارة أنظمة المراقبة الأمنية - قسم التشغيل CCTV</h2>

</div>

</div>

</header>

<section class="filterCard">

<div class="filterGrid">

<div>

<label>نوع التقرير</label>

<select id="reportType">

<option value="daily">يومي</option>

<option value="weekly">أسبوعي</option>

<option value="monthly">شهري</option>

<option value="custom">فترة مخصصة</option>

</select>

</div>

<div>

<label>من تاريخ</label>

<input type="date" id="fromDate">

</div>

<div>

<label>إلى تاريخ</label>

<input type="date" id="toDate">

</div>

<button id="generateReport">

إنشاء التقرير

</button>

</div>

</section><section class="statsCard">

<div class="statsGrid">

<div class="statBox">

<h3 id="missionsCount">

0

</h3>

<span>

إجمالي المهام

</span>

</div>

<div class="statBox">

<h3 id="completedCount">

0

</h3>

<span>

المهام المكتملة

</span>

</div>

<div class="statBox">

<h3 id="operatorsCount">

0

</h3>

<span>

عدد المشغلين

</span>

</div>

<div class="statBox">

<h3 id="hoursCount">

0

</h3>

<span>

إجمالي ساعات الرصد

</span>

</div>

<div class="statBox">

<h3 id="violationsCount">

0

</h3>

<span>

المخالفات المكتشفة

</span>

</div>

<div class="statBox">

<h3 id="completionRate">

0%

</h3>

<span>

نسبة الإنجاز

</span>

</div>

</div>

</section>

<section class="reportCard">

<h2>

نتائج التقرير

</h2>

<div id="reportContent">

اختر نوع التقرير ثم اضغط على إنشاء التقرير.

</div>

</section>

<section class="actionsCard">

<button id="printReport">

🖨 طباعة

</button>

<button id="pdfReport">

📄 تصدير PDF

</button>

<button id="excelReport">

📊 تصدير Excel

</button>

<button id="copyReport">

📋 نسخ التقرير

</button>

</section>

<script src="js/reports.js"></script>

</body>

</html>
